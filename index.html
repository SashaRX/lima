<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIMA — изделия из дерева</title>
<meta name="description" content="Lima — небольшая столярная мастерская. Доски, посуда и предметы интерьера из массива бука, ручная работа.">
<meta name="theme-color" content="#16171b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16171b; --panel:#1f2027; --panel-soft:#191a20;
    --ink:#ece5d8; --muted:#a8a08f; --faint:#6f685d;
    --line:rgba(236,229,216,.13); --line-strong:rgba(236,229,216,.28);
    --accent:#c8a06a; --accent-ink:#16171b;
    --serif:'Cormorant',Georgia,serif; --sans:'Manrope',system-ui,-apple-system,sans-serif;
    --maxw:1240px; --pad:clamp(16px,4vw,48px);
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; color:var(--ink); font-family:var(--sans); font-weight:400; line-height:1.5;
    background:#131419 linear-gradient(180deg,#1a1b21 0%,#16171b 55%,#131419 100%) fixed;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  img{max-width:100%;display:block;}
  h1,h2,h3{margin:0;font-weight:400;}
  p{margin:0;}
  ::selection{background:var(--accent);color:var(--accent-ink);}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);}

  /* ---------- header ---------- */
  .hdr{position:sticky;top:0;z-index:50;background:rgba(20,21,26,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);}
  .hdr-in{max-width:var(--maxw);margin:0 auto;padding:13px var(--pad);display:flex;align-items:center;gap:22px;}
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
  .brand svg{height:24px;width:auto;flex:none;}
  .brand b{font-family:var(--serif);font-weight:500;font-size:23px;letter-spacing:.08em;}
  .nav{display:flex;gap:26px;margin-left:auto;font-size:12px;letter-spacing:.16em;text-transform:uppercase;}
  .nav span{cursor:pointer;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent;transition:color .2s,border-color .2s;}
  .nav span:hover{color:var(--ink);}
  .nav span.on{color:var(--ink);border-color:var(--accent);}
  .actions{display:flex;align-items:center;gap:18px;margin-left:auto;}
  .lang{display:inline-flex;align-items:center;gap:6px;font-size:12px;letter-spacing:.14em;}
  .lang span{cursor:pointer;color:var(--muted);}
  .lang span.on{color:var(--ink);font-weight:600;}
  .lang i{color:var(--faint);font-style:normal;}
  .cart-link{display:inline-flex;align-items:center;gap:7px;cursor:pointer;color:var(--ink);font-size:13px;}
  .cart-link svg{height:19px;width:19px;flex:none;stroke:currentColor;fill:none;stroke-width:1.4;}
  .cart-link b{color:var(--accent);font-weight:500;}
  .burger{display:none;flex-direction:column;gap:5px;width:24px;cursor:pointer;padding:4px 0;}
  .burger i{height:1.5px;background:var(--ink);display:block;}
  .nav.in-actions{margin-left:0;}

  /* ---------- mobile menu ---------- */
  .menu{position:fixed;inset:0;z-index:90;background:rgba(20,21,26,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;padding:24px var(--pad);}
  .menu-top{display:flex;align-items:center;justify-content:space-between;}
  .menu-top b{font-family:var(--serif);font-size:26px;letter-spacing:.07em;}
  .menu-close{font-size:30px;line-height:1;cursor:pointer;color:var(--ink);}
  .menu nav{display:flex;flex-direction:column;gap:4px;margin-top:42px;}
  .menu nav span{font-family:var(--serif);font-size:32px;cursor:pointer;padding:6px 0;color:var(--ink);}
  .menu nav span.on{color:var(--accent);}
  .menu .m-lang{display:flex;gap:14px;margin-top:28px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;}
  .menu .m-foot{margin-top:auto;font-size:12px;color:var(--faint);line-height:2;}

  /* ---------- hero ---------- */
  .hero{text-align:center;padding:clamp(46px,9vw,104px) var(--pad) clamp(26px,4vw,44px);position:relative;}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 120% at 50% -10%,rgba(200,160,106,.10),transparent 60%);pointer-events:none;}
  .hero .eyebrow{position:relative;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);}
  .hero h1{position:relative;font-family:var(--serif);font-weight:500;font-size:clamp(38px,8vw,84px);line-height:1.04;letter-spacing:-.01em;margin:16px auto 0;max-width:14ch;}
  .hero p{position:relative;color:var(--muted);max-width:520px;margin:18px auto 0;font-size:clamp(14px,2.4vw,16px);}
  .hero .cta{position:relative;margin-top:30px;}

  /* ---------- category chips ---------- */
  .catbar{display:flex;gap:22px;overflow-x:auto;padding:6px var(--pad) 4px;scrollbar-width:none;border-bottom:1px solid var(--line);}
  .catbar::-webkit-scrollbar{display:none;}
  .catbar .in{max-width:var(--maxw);margin:0 auto;display:flex;gap:22px;}
  .chip{cursor:pointer;font-size:11px;letter-spacing:.16em;text-transform:uppercase;white-space:nowrap;flex:none;color:var(--faint);padding-bottom:6px;border-bottom:1px solid transparent;transition:color .2s,border-color .2s;}
  .chip:hover{color:var(--muted);}
  .chip.on{color:var(--ink);border-color:var(--accent);}
  .count{margin-left:auto;flex:none;align-self:center;font-size:11px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}

  /* ---------- buttons ---------- */
  .btn{display:inline-block;padding:15px 34px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:opacity .2s,background .2s,color .2s;text-align:center;}
  .btn:hover{opacity:.9;}
  .btn.accent{background:var(--accent);color:var(--accent-ink);}
  .btn.ghost{border-color:var(--line-strong);color:var(--ink);}
  .btn.ghost:hover{border-color:var(--ink);opacity:1;}

  /* ---------- catalog ---------- */
  .section{padding-top:30px;padding-bottom:90px;}
  .grid{display:grid;gap:clamp(18px,2.4vw,30px) clamp(14px,2vw,28px);grid-template-columns:repeat(2,1fr);}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr);}}
  .card{cursor:pointer;}
  .card .media{position:relative;aspect-ratio:4/5;background:var(--panel);border-radius:14px;overflow:hidden;}
  .card .media .img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 1s cubic-bezier(.2,.7,.3,1);}
  .card:hover .media .img{transform:scale(1.045);}
  .card .add{position:absolute;bottom:12px;right:12px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:transform .2s;}
  .card .add:hover{transform:scale(1.1);}
  .card h3{font-family:var(--serif);font-size:clamp(17px,2.3vw,21px);line-height:1.18;margin-top:13px;}
  .card .meta{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:6px;}
  .card .meta .m{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .card .meta .p{font-size:14px;white-space:nowrap;flex:none;}

  /* ---------- product detail ---------- */
  .back{display:inline-flex;gap:8px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);cursor:pointer;margin-bottom:30px;}
  .pd{display:grid;grid-template-columns:1fr;gap:clamp(26px,5vw,56px);align-items:start;}
  .pd>div{min-width:0;}
  @media(min-width:860px){.pd{grid-template-columns:1.05fr 1fr;}}
  .pd .media{position:relative;aspect-ratio:4/5;background:var(--panel);border-radius:18px;overflow:hidden;}
  .pd .media .img{position:absolute;inset:0;background-size:cover;background-position:center;}
  .pd .cat{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;}
  .pd h1{font-family:var(--serif);font-size:clamp(34px,5.4vw,58px);line-height:1.03;letter-spacing:-.01em;}
  .pd .price{font-family:var(--serif);font-size:30px;margin-top:20px;}
  .pd .desc{color:var(--muted);line-height:1.75;margin-top:22px;max-width:460px;font-size:15px;}
  .pd .specs{display:flex;flex-direction:column;gap:13px;margin:30px 0 0;padding:24px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .pd .specs div{display:flex;justify-content:space-between;font-size:13px;gap:14px;}
  .pd .specs .k{color:var(--faint);}
  .pd .actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;}
  .related{margin-top:80px;border-top:1px solid var(--line);padding-top:36px;}
  .related h2{font-family:var(--serif);font-size:28px;margin-bottom:28px;}
  .rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:clamp(16px,2vw,24px);}
  @media(min-width:720px){.rgrid{grid-template-columns:repeat(4,1fr);}}
  .rgrid .media{position:relative;aspect-ratio:4/5;background:var(--panel);border-radius:12px;overflow:hidden;cursor:pointer;}
  .rgrid .media .img{position:absolute;inset:0;background-size:cover;background-position:center;}
  .rgrid .rt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:12px;}
  .rgrid .rt span:first-child{font-family:var(--serif);font-size:18px;}
  .rgrid .rt span:last-child{font-size:13px;white-space:nowrap;}

  /* ---------- generic page ---------- */
  .page .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
  .page h1{font-family:var(--serif);font-size:clamp(34px,6.4vw,72px);line-height:1.02;letter-spacing:-.015em;}
  .page .lead{color:var(--muted);line-height:1.75;margin-top:26px;max-width:760px;font-size:clamp(15px,2.2vw,17px);}
  .cols2{display:grid;grid-template-columns:1fr;gap:clamp(28px,5vw,56px);align-items:center;margin-top:clamp(40px,6vw,72px);}
  @media(min-width:860px){.cols2{grid-template-columns:1fr 1fr;}}
  .cols2 .ph{aspect-ratio:4/3;border-radius:18px;overflow:hidden;background:var(--panel);}
  .cols2 .ph img{width:100%;height:100%;object-fit:cover;}
  .cols2 h2{font-family:var(--serif);font-size:30px;margin-bottom:16px;}
  .cols2 p{color:var(--muted);line-height:1.8;font-size:15px;}
  .values{display:grid;grid-template-columns:1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-top:clamp(40px,6vw,72px);}
  @media(min-width:680px){.values{grid-template-columns:repeat(3,1fr);}}
  .values .v{background:var(--bg);padding:34px 28px;}
  .values .v .n{font-family:var(--serif);font-size:44px;color:var(--accent);}
  .values .v h3{font-size:16px;margin-top:10px;}
  .values .v p{font-size:13.5px;line-height:1.7;color:var(--muted);margin-top:9px;}
  .center{text-align:center;margin-top:clamp(48px,7vw,80px);}

  /* ---------- delivery / contacts ---------- */
  .twolist{display:grid;grid-template-columns:1fr;gap:clamp(32px,5vw,56px);margin-top:30px;}
  @media(min-width:780px){.twolist{grid-template-columns:1fr 1fr;}}
  .twolist h2{font-family:var(--serif);font-size:28px;margin-bottom:18px;}
  .twolist .list{border-top:1px solid var(--line);}
  .twolist .row{padding:18px 0;border-bottom:1px solid var(--line);}
  .twolist .row .t{display:flex;justify-content:space-between;gap:16px;}
  .twolist .row .t span:first-child{font-size:15px;}
  .twolist .row .t span:last-child{font-size:13px;color:var(--muted);}
  .twolist .row .t .free{color:var(--accent);}
  .twolist .row p{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;}
  .note{margin-top:26px;padding:20px 22px;border-radius:14px;background:var(--panel-soft);font-size:13px;line-height:1.7;color:var(--muted);}
  .ccards{display:grid;grid-template-columns:1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:44px;}
  @media(min-width:680px){.ccards{grid-template-columns:repeat(3,1fr);}}
  .ccards .c{background:var(--bg);padding:32px 28px;}
  .ccards .c .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:11px;}
  .ccards .c .big{font-family:var(--serif);font-size:23px;}
  .ccards .c p{font-size:13px;color:var(--muted);margin-top:9px;}

  /* ---------- cart ---------- */
  .cart-row{display:grid;grid-template-columns:64px 1fr auto;gap:16px;align-items:center;padding:20px 0;border-bottom:1px solid var(--line);}
  .cart-row .th{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--panel);position:relative;}
  .cart-row .th .img{position:absolute;inset:0;background-size:cover;background-position:center;}
  .cart-row .nm{font-family:var(--serif);font-size:20px;}
  .cart-row .mt{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:4px;}
  .cart-row .ctl{display:flex;align-items:center;gap:14px;margin-top:11px;flex-wrap:wrap;}
  .qty{display:inline-flex;align-items:center;border:1px solid var(--line-strong);border-radius:999px;}
  .qty span{width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--muted);}
  .qty b{min-width:24px;text-align:center;font-size:13px;font-weight:400;}
  .cart-row .rm{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);cursor:pointer;}
  .cart-row .lt{text-align:right;font-size:15px;white-space:nowrap;}
  .summary{width:100%;max-width:360px;margin-top:32px;}
  @media(min-width:780px){.summary{margin-left:auto;}}
  .summary .ln{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:8px 0;}
  .summary .ln.bd{border-bottom:1px solid var(--line);}
  .summary .tot{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0;}
  .summary .tot span{font-family:var(--serif);}
  .summary .tot .a{font-size:24px;} .summary .tot .b{font-size:28px;}
  .empty,.done{padding:72px 0;text-align:center;border-top:1px solid var(--line);}
  .empty p,.done p{color:var(--muted);}
  .done .tt{font-family:var(--serif);font-size:36px;}

  /* ---------- form ---------- */
  .form{display:grid;grid-template-columns:1fr;gap:18px;margin-top:clamp(36px,5vw,54px);}
  @media(min-width:640px){.form{grid-template-columns:1fr 1fr;}}
  .form label{display:flex;flex-direction:column;gap:9px;}
  .form label.full{grid-column:1/-1;}
  .form .fl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);}
  .form input,.form textarea{background:#1c1d24;border:1px solid var(--line-strong);color:var(--ink);padding:14px 16px;font-size:14px;border-radius:8px;outline:none;width:100%;font-family:inherit;}
  .form input:focus,.form textarea:focus{border-color:var(--accent);}
  .form textarea{resize:vertical;line-height:1.6;}
  .form .sub{grid-column:1/-1;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:6px;}
  .form .sub .hint{font-size:12px;color:var(--faint);}
  .sent{margin-top:clamp(36px,5vw,54px);padding:56px 36px;border:1px solid var(--line);border-radius:18px;text-align:center;background:var(--panel-soft);}
  .sent .tt{font-family:var(--serif);font-size:34px;}
  .sent p{color:var(--muted);margin-top:14px;line-height:1.7;max-width:420px;margin-inline:auto;}

  /* ---------- footer ---------- */
  .ftr{border-top:1px solid var(--line);margin-top:50px;background:linear-gradient(180deg,transparent,#101116 90px);}
  .ftr-in{display:grid;grid-template-columns:1fr;gap:30px;padding:40px var(--pad) 0;max-width:var(--maxw);margin:0 auto;}
  @media(min-width:720px){.ftr-in{grid-template-columns:1.7fr 1fr 1fr;}}
  .ftr .b{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
  .ftr .b svg{height:26px;} .ftr .b b{font-family:var(--serif);font-size:22px;letter-spacing:.06em;}
  .ftr .desc{font-size:12px;line-height:1.7;color:var(--faint);max-width:300px;}
  .ftr .col{display:flex;flex-direction:column;gap:9px;}
  .ftr .col .h{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);margin-bottom:2px;}
  .ftr .col span{font-size:12.5px;color:var(--muted);}
  .ftr .col span.lnk{cursor:pointer;}
  .ftr .col span.lnk:hover{color:var(--ink);}
  .ftr-bottom{max-width:var(--maxw);margin:26px auto 0;padding:14px var(--pad);border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--faint);}

  /* ---------- responsive header ---------- */
  @media(max-width:860px){
    .nav{display:none;}
    .lang{display:none;}
    .burger{display:flex;}
  }
  @media(max-width:520px){
    .pd .actions{flex-direction:column;align-items:stretch;}
    .pd .actions .btn{width:100%;}
  }
</style>
</head>

    function v(n,h,d){return '<div class="v"><div class="n">'+n+'</div><h3>'+E(h)+'</h3><p>'+E(d)+'</p></div>';}
    return '<div class="wrap section page">'+
      '<div style="max-width:760px"><div class="eyebrow">'+E(t.aboutEyebrow)+'</div><h1>'+E(t.aboutTitle)+'</h1><p class="lead">'+E(t.aboutIntro)+'</p></div>'+
      '<div class="cols2"><div class="ph"><img src="assets/handles-dark.png" alt=""></div>'+
        '<div><h2>'+E(t.aboutSub2)+'</h2><p>'+E(t.aboutSub2Text)+'</p></div></div>'+
      '<div class="values">'+v("01",t.aboutV1t,t.aboutV1d)+v("02",t.aboutV2t,t.aboutV2d)+v("03",t.aboutV3t,t.aboutV3d)+'</div>'+
      '<div class="center"><span class="btn accent" data-act="go" data-view="custom">'+E(t.aboutCta)+'</span></div>'+
    '</div>';
  }

  function customView(){
    var t=L(), body;
    if(state.customSent){
      body='<div class="sent"><div class="tt">'+E(t.customSentTitle)+'</div><p>'+E(t.customSentText)+'</p><div style="margin-top:26px"><span class="btn ghost" data-act="go" data-view="home">'+E(t.toCatalogShort)+'</span></div></div>';
    } else {
      function f(lab,ph,full){return '<label'+(full?' class="full"':'')+'><span class="fl">'+E(lab)+'</span><input type="text" placeholder="'+E(ph)+'"></label>';}
      body='<div class="form">'+f(t.fName,t.phName)+f(t.fContact,t.phContact)+f(t.fType,t.phType,1)+
        '<label class="full"><span class="fl">'+E(t.fDesc)+'</span><textarea rows="5" placeholder="'+E(t.phDesc)+'"></textarea></label>'+
        '<div class="sub"><span class="btn accent" data-act="sendCustom">'+E(t.sendRequest)+'</span><span class="hint">'+E(t.orWrite)+'</span></div></div>';
    }
    return '<div class="wrap section page"><div style="max-width:680px"><div class="eyebrow">'+E(t.customEyebrow)+'</div><h1>'+E(t.customTitle)+'</h1><p class="lead">'+E(t.customIntro)+'</p></div>'+body+'</div>';
  }

  function deliveryView(){
    var t=L();
    function row(tt,pp,dd,free){return '<div class="row"><div class="t"><span>'+E(tt)+'</span><span class="'+(free?"free":"")+'">'+E(pp)+'</span></div><p>'+E(dd)+'</p></div>';}
    function pay(tt,dd){return '<div class="row"><div class="t"><span>'+E(tt)+'</span></div><p>'+E(dd)+'</p></div>';}
    return '<div class="wrap section page"><div class="eyebrow">'+E(t.delEyebrow)+'</div><h1 style="margin-bottom:46px">'+E(t.delTitle)+'</h1>'+
      '<div class="twolist"><div><h2>'+E(t.delivery)+'</h2><div class="list">'+row(t.del1,t.free,t.del1d,1)+row(t.del2,t.del2p,t.del2d)+row(t.del3,t.del3p,t.del3d)+'</div></div>'+
      '<div><h2>'+E(t.payment)+'</h2><div class="list">'+pay(t.pay1,t.pay1d)+pay(t.pay2,t.pay2d)+pay(t.pay3,t.pay3d)+'</div><div class="note">'+E(t.payNote)+'</div></div></div></div>';
  }

  function contactsView(){
    var t=L();
    function c(lab,big,note){return '<div class="c"><div class="lbl">'+E(lab)+'</div><div class="big">'+E(big)+'</div><p>'+E(note)+'</p></div>';}
    return '<div class="wrap section page"><div class="eyebrow">'+E(t.conEyebrow)+'</div><h1 style="margin-bottom:46px">'+E(t.conTitle)+'</h1>'+
      '<div class="ccards">'+c(t.phone,"+7 900 000-00-00",t.hours)+c(t.emailW,"hello@lima-wood.ru",t.emailNote)+c(t.social,"@lima.wood",t.socialNote)+'</div>'+
      '<div class="cols2" style="margin-top:0"><div><h2>'+E(t.conWsTitle)+'</h2><p>'+E(t.conWsText)+'</p><div style="margin-top:24px"><span class="btn accent" data-act="go" data-view="custom">'+E(t.conWsCta)+'</span></div></div>'+
        '<div class="ph"><img src="assets/board-bread.png" alt=""></div></div></div>';
  }

  function footer(){
    var t=L();
    var sec = t.nav.map(function(n){return '<span class="lnk" data-act="go" data-view="'+n.view+'">'+E(n.l)+'</span>';}).join("");
    return '<footer class="ftr"><div class="ftr-in">'+
      '<div><div class="b">'+EMBLEM+'<b>LIMA</b></div><p class="desc">'+E(t.footerDesc)+'</p></div>'+
      '<div class="col"><div class="h">'+E(t.footerSections)+'</div>'+sec+'</div>'+
      '<div class="col"><div class="h">'+E(t.footerContacts)+'</div><span>+7 900 000-00-00</span><span>hello@lima-wood.ru</span><span>@lima.wood</span></div>'+
    '</div><div class="ftr-bottom"><span>© 2025 Lima</span><span>'+E(t.handmade)+'</span></div></footer>';
  }

  /* ===================== render ===================== */
  function render(){
    var lang = state.lang, v = state.view, screen;
    if (v==="product") screen = productView(lang);
    else if (v==="cart") screen = cartView(lang);
    else if (v==="about") screen = aboutView();
    else if (v==="custom") screen = customView();
    else if (v==="delivery") screen = deliveryView();
    else if (v==="contacts") screen = contactsView();
    else screen = homeView(lang);
    app.innerHTML = header(lang) + menu(lang) + screen + footer();
  }

  /* ===================== events ===================== */
  app.addEventListener("click", function(e){
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) return;
    var a = el.getAttribute("data-act"), id = el.getAttribute("data-id");
    switch(a){
      case "go": go(el.getAttribute("data-view")); break;
      case "goTop": go("home"); break;
      case "toggleMenu": toggleMenu(); break;
      case "lang": setLang(el.getAttribute("data-lang")); break;
      case "cat": setCategory(el.getAttribute("data-cat")); break;
      case "open": openProduct(parseInt(id,10)); break;
      case "add": e.stopPropagation(); addToCart(parseInt(id,10)); break;
      case "addgo": addToCart(parseInt(id,10)); go("cart"); break;
      case "inc": changeQty(parseInt(id,10),1); break;
      case "dec": changeQty(parseInt(id,10),-1); break;
      case "remove": removeFromCart(parseInt(id,10)); break;
      case "checkout": checkout(); break;
      case "sendCustom": sendCustom(); break;
      case "scrollCatalog": scrollCatalog(); break;
    }
  });

  render();
  // load the published catalog (edited via admin.html); the inlined PRODUCTS above is the offline fallback
  fetch("products.json?cb=" + Date.now())
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) { if (Array.isArray(d) && d.length) { PRODUCTS = d; render(); } })
    .catch(function () {});
})();
</script>
</body>
</html>
